# Fix neovim :checkhealth warnings
set-option -sg escape-time 10
set-option -g focus-events on
set-option -g default-terminal "screen-256color"
set-option -a terminal-features 'xterm-256color:RGB'
set-option -a terminal-overrides ',screen-256color:Tc'

# vim-tmux-navigator: seamless Ctrl-h/j/k/l across nvim splits and tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key h previous-window
bind-key l next-window

# reload tmux config from within tmux with prefix -> r
bind-key r source-file ~/.tmux.conf \; display-message ".tmux.config reloaded"

# Mouse Mode
set -g mouse on

# Synchronize Panes - (send same keys to all panes in window)
bind-key y set-window-option synchronize-panes\; display-message "sychronize mode toggled."

# Vim keybindings for interactive modes
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# STATUS BAR
##### STATUS BAR BASICS #####

set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-left-length 50
set -g status-right-length 100

##### COLORS #####

set -g status-style bg=#1e1e2e,fg=#cdd6f4

set -g window-status-style fg=#6c7086,bg=#1e1e2e
set -g window-status-current-style fg=#1e1e2e,bg=#89b4fa,bold

##### LEFT SIDE #####
# session + host

set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086]@#H "

##### WINDOW LIST #####

set -g window-status-format " #[fg=#6c7086]#I:#W "
set -g window-status-current-format " #[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "

##### RIGHT SIDE #####
# git branch + cpu load + time
set -g status-right "\
#[fg=#a6e3a1]git: #(cd #{pane_current_path} 2>/dev/null && \
git rev-parse --abbrev-ref HEAD 2>/dev/null | tr -d '\n' && \
git diff --quiet --cached 2>/dev/null || printf '+' && \
git diff --quiet 2>/dev/null || printf '-') \
#[fg=#f9e2af]cpu: #(uptime | awk -F'load averages?: ' '{print $2}' | cut -d',' -f1) \
#[fg=#89b4fa]🕒 %H:%M "

##### SMALL QUALITY OF LIFE #####

# make pane borders nicer
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#89b4fa

# message colors
set -g message-style bg=#1e1e2e,fg=#89b4fa
